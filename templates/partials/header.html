<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DriveElite | Premium Car Rentals</title>
  <style>
    /* Reset basic core window box properties */
    * {
      box-sizing: border-box;
    }
    body, html {
      margin: 0;
      padding: 0;
      background-color: #0a0a0a; /* Pure Velvet Black */
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      width: 100%;
    }

    /* Solidified Header Container spanning full screen width */
    .custom-navbar {
      display: flex !important;
      justify-content: space-between !important;
      align-items: center !important;
      background-color: #161616 !important; /* Rich Obsidian */
      padding: 20px 50px !important;
      position: relative;
      width: 100% !important;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
      border-bottom: 1px solid #222222;
    }

    /* Brand Logo area styling */
    .nav-logo {
      display: block;
    }
    .nav-logo a {
      font-size: 1.8rem;
      font-weight: 800;
      color: #f5f5f5;
      text-decoration: none;
      letter-spacing: 1px;
    }
    .nav-logo a span {
      color: #d4af37; /* Luxury Gold */
    }

    /* Right-aligned flex block item links */
    .nav-menu {
      display: flex !important;
      list-style: none !important;
      margin: 0 !important;
      padding: 0 !important;
      gap: 30px !important;
      align-items: center;
    }

    .nav-item {
      display: inline-block;
    }

    .nav-item a {
      color: #aa9977; /* Muted Brass Links */
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 8px 12px;
      transition: all 0.3s ease;
      position: relative;
    }

    /* Micro-interaction sliding hover rule */
    .nav-item a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: 0;
      left: 12px;
      background-color: #d4af37;
      transition: width 0.3s ease;
    }

    .nav-item a:hover::after {
      width: calc(100% - 24px);
    }

    .nav-item a:hover {
      color: #f5f5f5;
    }

    /* Active Highlight tracker */
    .nav-item.active a {
      color: #d4af37 !important;
    }
  </style>
</head>
<body>

<nav class="custom-navbar">
  <div class="nav-logo">
    <a href="{% url 'home' %}">Drive<span>Elite</span></a>
  </div>

<ul class="nav-menu">
    <li class="nav-item {% if request.resolver_match.url_name == 'home' %}active{% endif %}">
      <a href="{% url 'home' %}">Home</a>
    </li>
    <li class="nav-item {% if request.resolver_match.url_name == 'about' %}active{% endif %}">
      <a href="{% url 'about' %}">About</a>
    </li>
    <li class="nav-item {% if request.resolver_match.url_name == 'services' %}active{% endif %}">
      <a href="{% url 'services' %}">Services</a>
    </li>
    <li class="nav-item {% if request.resolver_match.url_name == 'car_rent' or request.resolver_match.url_name == 'car_detail' %}active{% endif %}">
      <a href="{% url 'car_rent' %}">CarRent</a>
    </li>
    <li class="nav-item {% if request.resolver_match.url_name == 'contact' %}active{% endif %}">
      <a href="{% url 'contact' %}">Contact</a>
    </li>
    
    {% if request.user.is_authenticated %}
      <li class="nav-item">
        <a href="{% url 'logout' %}" style="color: #ff6b6b;">Logout ({{ request.user.username }})</a>
      </li>
    {% else %}
      <li class="nav-item {% if request.resolver_match.url_name == 'login' %}active{% endif %}">
        <a href="{% url 'login' %}" style="color: #d4af37;">Login</a>
      </li>
    {% endif %}
  </ul>
</nav>
