{% include 'patials/header.html' %}
<style>
    h1{color: chocolate;
        display: flex;
        justify-content: center;
        align-items: center;
}
    
</style>

<ul class="car-list">
    {% for car in cars %}
    <li>
        <a href="{% url 'car_detail' car.id %}">
        <img src="{{ car.image }}" alt="{{ car.name }}" width="200">
        </a>
        <h3>{{ car.make }} {{ car.model }} ({{ car.year }})</h3>
    </li>
    {% endfor %}
</ul>

{% include 'patials/footer.html'%}
